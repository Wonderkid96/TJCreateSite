<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 185 275">
  <!--
    Brighton Dome — classic serif D rendered via SVG text so the browser
    draws the exact glyph outline (clean counter, correct proportions).
    'Brighton Dome' wordmark sits inside the counter.
    Used as a CSS mask; fill colour is applied by the marquee component.
  -->

  <!-- Large D — Georgia gives the wide, high-contrast serif shape -->
  <text
    x="2"
    y="254"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-size="268"
    fill="black"
  >D</text>

  <!-- Wordmark centred inside the counter -->
  <text
    x="106"
    y="148"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-size="22"
    fill="black"
  >Brighton</text>

  <text
    x="106"
    y="175"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-size="22"
    fill="black"
  >Dome</text>
</svg>
