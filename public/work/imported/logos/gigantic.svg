<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <!--
    Gigantic — bold wordmark inside a slightly counter-clockwise-rotated
    rectangular border, matching the stamp-style logo.
    Used as a CSS mask; fill colour is applied by the marquee component.
  -->

  <!-- Rotate both the border and the text together around the visual centre -->
  <g transform="rotate(-5, 200, 120)">

    <!-- Rectangular border (stroke only — interior stays transparent in the mask) -->
    <rect
      x="18"
      y="52"
      width="364"
      height="136"
      fill="none"
      stroke="black"
      stroke-width="14"
    />

    <!-- 'gigantic' wordmark -->
    <text
      x="200"
      y="148"
      text-anchor="middle"
      font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
      font-weight="900"
      font-size="76"
      fill="black"
    >gigantic</text>

  </g>
</svg>
