<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 318 192">
  <!--
    Jazz Re:freshed — bold italic wordmark with bubble cluster and Japanese subtitle.
    Used as a CSS mask; fill is applied by the marquee component.
  -->

  <!-- Bubble cluster — top right, above the 'zz' in jazz -->
  <circle cx="291" cy="14" r="14" fill="black"/>
  <circle cx="268"  cy="4"  r="9"  fill="black"/>
  <circle cx="308" cy="34" r="7"  fill="black"/>
  <circle cx="252" cy="16" r="5"  fill="black"/>
  <circle cx="283" cy="38" r="4"  fill="black"/>
  <circle cx="305"  cy="8"  r="3"  fill="black"/>

  <!-- 'jazz' — large bold italic -->
  <text
    x="0"
    y="96"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-style="italic"
    font-size="96"
    fill="black"
  >jazz</text>

  <!-- 're:freshed' — bold italic, slightly smaller -->
  <text
    x="2"
    y="150"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-style="italic"
    font-size="50"
    fill="black"
  >re:freshed</text>

  <!-- Japanese subtitle -->
  <text
    x="4"
    y="176"
    font-family="'Hiragino Sans', 'Yu Gothic', sans-serif"
    font-size="16"
    fill="black"
  >ジャズリ:フレッシュド</text>
</svg>
